# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - SBAPrequalifier

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Azure App Service Linux's built-in Node image doesn't ship Chromium's
      # runtime libs (libnspr4, libnss3, libatk*, libgbm1, libasound2, X11
      # stack, GTK, Pango, Cairo, fonts-liberation). We can't apt-install
      # them in the worker — its filesystem is ephemeral and Startup Command
      # installs don't persist through restarts. So we download the .debs
      # here and bundle them into the deploy artifact. /home/site/wwwroot
      # IS persistent, and setting LD_LIBRARY_PATH in App Service config
      # points the dynamic linker at them at runtime.
      - name: Bundle Chromium runtime libs
        run: |
          set -e
          # Candidate list of Chromium-required libs. Ubuntu 24.04 renamed
          # several of these with a "t64" suffix as part of the 64-bit
          # time_t transition (libasound2 → libasound2t64, etc.); on amd64
          # the contained .so files are ABI-identical, so the rename is
          # cosmetic. We list both the original and t64 forms and filter
          # to whichever is present in apt-cache — keeps the workflow
          # working on both ubuntu-22.04 and ubuntu-24.04 runners.
          CANDIDATES="libnspr4 libnss3 \
            libatk1.0-0 libatk1.0-0t64 \
            libatk-bridge2.0-0 libatk-bridge2.0-0t64 \
            libatspi2.0-0 libatspi2.0-0t64 \
            libcups2 libcups2t64 \
            libdrm2 libgbm1 \
            libasound2 libasound2t64 \
            libxcomposite1 libxdamage1 libxrandr2 libxshmfence1 \
            libxkbcommon0 libxtst6 libxfixes3 libxi6 libxrender1 \
            libx11-xcb1 libxcb-dri3-0 \
            libpango-1.0-0 libcairo2 \
            libgtk-3-0 libgtk-3-0t64 \
            fonts-liberation"

          sudo apt-get update -qq

          # Filter to packages with a real installation candidate. On Ubuntu
          # 24.04, the non-t64 names (e.g. "libasound2") are virtual and
          # have Candidate: (none), so they're dropped; the t64 variants
          # are real packages and are kept. On 22.04 the reverse is true.
          PKGS=""
          for candidate in $CANDIDATES; do
            ver=$(apt-cache policy "$candidate" 2>/dev/null | awk '/^  Candidate:/ { print $2 }')
            if [ -n "$ver" ] && [ "$ver" != "(none)" ]; then
              PKGS="$PKGS $candidate"
            fi
          done
          echo "Resolved top-level packages: $PKGS"

          # Resolve the full transitive dep closure. `apt-get install
          # --download-only` would skip packages already installed on the
          # runner (which is our case — runner has these libs system-wide),
          # producing an empty bundle. `apt-get download` in a loop always
          # writes the .deb to cwd regardless of install state.
          RECURSIVE=$(apt-cache depends --recurse --no-recommends --no-suggests \
            --no-conflicts --no-breaks --no-replaces --no-enhances --no-pre-depends \
            $PKGS 2>/dev/null | grep '^\w' | sort -u)

          # Filter out base-system packages — shipping our own libc /
          # libstdc++ / etc. would break the Node runtime at load time.
          BLOCK='^(libc6|libc-bin|libc6:|libssl|libstdc\+\+|libgcc|zlib|base-files|dash|bash|coreutils|dpkg|perl-base|debconf|tzdata|libpcre|libbz2|libtinfo|libreadline|libselinux|liblzma|libzstd|ncurses|gcc-|python3|sensible-utils|libdb5|libsepol|libcap|libacl|libattr)'
          FILTERED=$(echo "$RECURSIVE" | grep -Ev "$BLOCK")
          echo "=== Final package list to download ($(echo "$FILTERED" | wc -l) entries) ==="
          echo "$FILTERED"

          mkdir -p chrome-libs-debs
          cd chrome-libs-debs
          for pkg in $FILTERED; do
            # apt-get download exits non-zero on virtual or unavailable
            # packages; swallow those and continue.
            apt-get download "$pkg" 2>/dev/null || echo "skip (no downloadable candidate): $pkg"
          done
          cd ..
          echo "=== Downloaded .deb count: $(ls chrome-libs-debs/*.deb 2>/dev/null | wc -l) ==="

          # Extract each .deb into chrome-libs/.
          mkdir -p chrome-libs
          for deb in chrome-libs-debs/*.deb; do
            [ -f "$deb" ] || continue
            dpkg -x "$deb" chrome-libs
          done

          rm -rf chrome-libs-debs
          echo "=== chrome-libs bundled (size / sample .so files) ==="
          du -sh chrome-libs
          find chrome-libs -name '*.so*' -printf '%p\n' 2>/dev/null | head -40

          # Fail loudly if the critical libs aren't there — better to break
          # the build than ship a silently-broken deploy.
          REQUIRED_SOS="libnspr4.so libnss3.so libasound.so.2"
          for so in $REQUIRED_SOS; do
            if ! find chrome-libs -name "$so*" | grep -q .; then
              echo "::error::Required lib missing from bundle: $so"
              exit 1
            fi
          done
          echo "All required .so files present."

      - name: Prepare standalone package
        run: |
          set -e
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          cp -r pdfs .next/standalone/pdfs 2>/dev/null || true
          cp -r chrome-libs .next/standalone/chrome-libs
          echo "=== chrome-libs inside standalone ==="
          du -sh .next/standalone/chrome-libs
          find .next/standalone/chrome-libs -name 'libnspr4.so*' -printf '%p\n'

          cd .next/standalone
          zip -r ../../deploy.zip .

          cd ../..
          echo "=== deploy.zip size ==="
          du -h deploy.zip
          echo "=== deploy.zip chrome-libs entries (first 10) ==="
          unzip -l deploy.zip | grep chrome-libs | head -10

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip standalone package
        run: |
          mkdir -p deploy
          unzip deploy.zip -d deploy

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SBAPrequalifier'
          slot-name: 'Production'
          package: deploy
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_527AF5399D68405F940CF4BE7B4400B2 }}
